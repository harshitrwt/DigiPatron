server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API PROXY ──────────────────────────────────────────
    location /api/ {
        # LOCAL DOCKER BACKEND
        proxy_pass http://backend:8000/api/;
        
        # PRODUCTION CLOUD RUN (Commented out)
        # proxy_pass https://digiwarden-backend-732791051995.us-central1.run.app/api/;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Uncomment for Cloud Run
        # proxy_ssl_server_name on;
        # proxy_set_header Host $proxy_host;
    }

    # ── ASSETS PROXY ───────────────────────────────────────
    location /assets/ {
        try_files $uri @backend_assets;
    }

    location @backend_assets {
        # LOCAL DOCKER BACKEND
        proxy_pass http://backend:8000;

        # PRODUCTION CLOUD RUN (Commented out)
        # proxy_pass https://digiwarden-backend-732791051995.us-central1.run.app;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Uncomment for Cloud Run
        # proxy_ssl_server_name on;
        # proxy_set_header Host $proxy_host;
    }

    location / {
        try_files $uri /index.html;
    }
}
